  <style>
    :root {
      --stone-50: #fafafa;
      --stone-100: #f5f5f5;
      --stone-200: #e5e5e5;
      --stone-300: #d4d4d4;
      --stone-400: #a3a3a3;
      --stone-500: #737373;
      --stone-600: #525252;
      --stone-700: #404040;
      --stone-800: #262626;
      --stone-900: #171717;

      --indigo-500: #6366f1;
      --indigo-600: #4f46e5;
      --indigo-700: #4338ca;

      --bg: #F8F8F7;
      --bg-surface: #ffffff;
      --text: #171717;
      --text-body: #525252;
      --text-secondary: #737373;
      --text-muted: #a3a3a3;
      --border: #ebebeb;
      --accent: #4f46e5;
      --accent-hover: #4338ca;

      --max-width: 660px;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-size: 18px;
    }

    body {
      font-family: 'Mona Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .container {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    /* Header */
    header {
      padding: 1rem 0;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }

    .header-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      color: var(--text);
      text-decoration: none;
    }

    .logo svg {
      height: 28px;
      width: auto;
    }

    /* Main content */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem 0;
    }

    .thanks-content {
      text-align: center;
      max-width: 480px;
    }

    .thanks-content h1 {
      font-size: clamp(1.5rem, 4vw, 1.889rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.25;
      margin-bottom: 1rem;
    }

    .thanks-content p {
      color: var(--text-body);
      margin-bottom: 1rem;
    }

    .thanks-content p:last-child {
      margin-bottom: 0;
    }

    .back-link {
      display: inline-block;
      margin-top: 1.5rem;
      font-size: 0.9375rem;
      font-weight: 500;
      color: var(--accent);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .back-link:hover {
      color: var(--accent-hover);
    }

    /* Footer */
    footer {
      padding: 2.5rem 0;
      border-top: 1px solid var(--border);
    }

    .footer-container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    .footer-copyright {
      font-size: 0.8125rem;
      color: var(--text-secondary);
      text-align: center;
    }
  </style>
</head>
