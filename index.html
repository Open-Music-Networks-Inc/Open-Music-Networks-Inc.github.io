<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DAW Tracks - Phase 4a Validation</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      #root {
        width: 100vw;
        height: 100vh;
      }
      
      /* CSS Variables for NeoRelief Design System */
      :root {
        /* Layout - Track and Timeline dimensions */
        --track-controls-width: 320px;
        --waveform-area-padding: 12px;
        --playhead-container-left: calc(var(--track-controls-width) + var(--waveform-area-padding));
        
        /* Colors - Core */
        --color-bg: #FFFFFF;
        --color-background: #F5F5F7;
        --color-surface: #FAFAFA;          /* Content area background */
        --color-surface-hover: #F2F2F7;
        --color-surface-active: #E5E5EA;
        
        /* Borders */
        --color-border: #E5E5E5;           /* Track borders */
        --color-border-light: #EFEFEF;     /* Content area separators (TracksHeader, Timeline) */
        --color-border-transport: #F2F2F7; /* Transport bottom border */
        
        /* Text */
        --color-text: #1D1D1F;
        --color-text-secondary: #86868B;
        --color-text-tertiary: #6E6E73;
        
        /* Accent Colors */
        --color-primary: #007AFF;
        --color-success: #32D74B;
        --color-warning: #FFD60A;
        --color-error: #FF3B30;
        
        /* Spacing */
        --spacing-xs: 4px;
        --spacing-sm: 8px;
        --spacing: 12px;
        --spacing-md: 12px;
        --spacing-lg: 16px;
        --spacing-xl: 20px;
        --spacing-2xl: 24px;
        --spacing-3xl: 48px;
        
        /* Border Radius */
        --radius-sm: 4px;
        --radius: 6px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --radius-xl: 16px;
        --radius-full: 999px;
        
        /* Transitions */
        --transition: all 0.2s ease;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
